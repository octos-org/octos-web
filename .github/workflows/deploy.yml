name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: E2E regression tests
        run: |
          npm run build
          npm run preview -- --host 127.0.0.1 --port 5174 > /tmp/octos-web-preview.log 2>&1 &
          echo $! > /tmp/octos-web-preview.pid
          trap 'kill "$(cat /tmp/octos-web-preview.pid)" 2>/dev/null || true' EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5174 >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:5174 >/dev/null || {
            cat /tmp/octos-web-preview.log
            exit 1
          }
          npm test -- tests/background-task-scope.spec.ts --project=chromium
      - run: npm run build
        env:
          BASE_URL: /octos-web/
      # SPA fallback for GitHub Pages client-side routing
      - run: cp dist/index.html dist/404.html
      # Build mdBook
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - run: mdbook build book
      - run: mv book/build dist/book
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
